name: tiltstack
# Create with: conda env create -f environment.yml
# Activate with: conda activate tiltstack
channels:
  - pytorch       # PyTorch builds (GPU)
  - nvidia        # NVIDIA CUDA runtime
  - conda-forge   # Alternative package sources
  - defaults

dependencies:
  # ---- Core Python ----
  - python=3.11                                    # Python interpreter
  - numpy                                         # Array operations
  - matplotlib                                    # Visualization

  # ---- Build & Bindings ----
  - pybind11                                      # C++/Python extension bindings
  - setuptools>=42.0.0                            # Build system (pip:)

  # ---- GPU & Clustering ----
  - faiss-gpu                                     # GPU K-means (clustering pipeline, required)
  - pytorch=2.5.1=py3.11_cuda12.4_cudnn9.1.0_0  # PyTorch GPU (requires CUDA 12.x driver)
  - pytorch-cuda=12.4                             # CUDA 12.4 runtime

  # ---- Testing ----
  - gtest                                         # Google Test framework (C++ unit tests)

  # ---- PyPI Packages ----
  - pip
  - pip:
      - open_spiel                                # OpenSpiel poker engine (evaluation only)
